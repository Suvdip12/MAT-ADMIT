services:
  - type: web
    name: admitcard-generator
    env: java
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/admitcard-generator-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: "-Xmx512m -Xms256m"
      - key: PORT
        value: 8080
      - key: FILE_STORAGE_LOCATION
        value: /opt/render/project/src/generated
