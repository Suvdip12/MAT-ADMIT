<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Studio | AdmitPro</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            height: calc(100vh - 200px);
            margin-top: 2rem;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            padding: 1.5rem;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }

        .preview-pane {
            background: white;
            border-radius: 1rem;
            overflow: auto;
            color: black;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="container" style="max-width: 1600px; padding: 1rem 2rem;">
        <nav style="margin-bottom: 1rem;">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    Admit<span>Pro</span> Studio
                </a>
                <span class="badge badge-primary" style="margin-left: 1rem; opacity: 0.8;">Beta</span>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn btn-outline" onclick="window.location.href='index.html'">Exit</button>
                <button class="btn btn-primary" onclick="saveTemplate()">Save Changes</button>
            </div>
        </nav>

        <div class="studio-layout animate-fade-in">
            <!-- Sidebar: Tools & Placeholders -->
            <div class="studio-sidebar">
                <div class="glass-card" style="padding: 1.5rem;">
                    <h3 style="font-size: 1rem; margin-bottom: 1rem;">Template Settings</h3>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Template Name</label>
                        <input type="text" id="template-name" placeholder="E.g. Engineering Exam" 
                            style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: white; outline: none;">
                    </div>
                </div>

                <div class="glass-card" style="padding: 1.5rem; flex: 1;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="font-size: 1rem;">Placeholders</h3>
                        <button class="btn btn-outline btn-sm" onclick="addCustomPlaceholder()" style="padding: 0.2rem 0.5rem; font-size: 0.7rem;">+ Add</button>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">Click to insert into editor</p>
                    <div id="placeholder-list" class="placeholder-list">
                        <span class="placeholder-chip" onclick="insertText('{{name}}')">name</span>
                        <span class="placeholder-chip" onclick="insertText('{{roll}}')">roll</span>
                        <span class="placeholder-chip" onclick="insertText('{{course}}')">course</span>
                        <span class="placeholder-chip" onclick="insertText('{{date}}')">date</span>
                        <span class="placeholder-chip" onclick="insertText('{{center}}')">center</span>
                    </div>
                </div>

                <div class="glass-card" style="padding: 1.5rem;">
                    <h3 style="font-size: 1rem; margin-bottom: 1rem;">Quick Actions</h3>
                    <button class="btn btn-outline btn-sm" onclick="loadDefault()" style="width: 100%; margin-bottom: 0.5rem;">Load Example</button>
                    <button class="btn btn-outline btn-sm" onclick="clearEditor()" style="width: 100%;">Clear All</button>
                </div>
            </div>

            <!-- Workspace: Editor -->
            <div class="editor-workspace">
                <div class="toolbar-studio">
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-outline btn-sm" onclick="wrapSelection('<b>', '</b>')"><b>B</b></button>
                        <button class="btn btn-outline btn-sm" onclick="wrapSelection('<i>', '</i>')"><i>I</i></button>
                        <button class="btn btn-outline btn-sm" onclick="wrapSelection('<center>', '</center>')">Align Center</button>
                    </div>
                    <div style="margin-left: auto; font-size: 0.8rem; color: var(--text-muted);" id="char-count">0 characters</div>
                </div>
                <div class="glass-card editor-card">
                    <textarea id="html-input" oninput="handleInput()"
                        placeholder="Start building your template..."></textarea>
                </div>
            </div>

            <!-- Preview Pane -->
            <div class="preview-container">
                <div id="preview" class="preview-paper">
                    <!-- Live Preview -->
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="app.js"></script>
    <script>
        const htmlInput = document.getElementById('html-input');
        const preview = document.getElementById('preview');
        const nameInput = document.getElementById('template-name');
        const charCount = document.getElementById('char-count');
        let currentId = null;

        // Check for EDIT mode
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('id')) {
            currentId = urlParams.get('id');
            loadTemplate(currentId);
        }

        function handleInput() {
            updatePreview();
            charCount.innerText = `${htmlInput.value.length} characters`;
        }

        function updatePreview() {
            preview.innerHTML = htmlInput.value;
        }

        function insertText(text) {
            const start = htmlInput.selectionStart;
            const end = htmlInput.selectionEnd;
            const val = htmlInput.value;
            htmlInput.value = val.substring(0, start) + text + val.substring(end);
            htmlInput.focus();
            htmlInput.selectionStart = htmlInput.selectionEnd = start + text.length;
            handleInput();
        }

        function wrapSelection(before, after) {
            const start = htmlInput.selectionStart;
            const end = htmlInput.selectionEnd;
            const selected = htmlInput.value.substring(start, end);
            const text = before + selected + after;
            insertText(text);
        }

        function addCustomPlaceholder() {
            const p = prompt("Placeholder Name (e.g. roll_no):");
            if (p) {
                const list = document.getElementById('placeholder-list');
                const chip = document.createElement('span');
                chip.className = 'placeholder-chip';
                chip.innerText = p;
                chip.onclick = () => insertText(`{{${p}}}`);
                list.appendChild(chip);
            }
        }

        function clearEditor() {
            if (confirm('Are you sure you want to clear the editor?')) {
                htmlInput.value = '';
                handleInput();
            }
        }

        async function saveTemplate() {
            const name = nameInput.value || 'Untitled Template';
            const html = htmlInput.value;

            if (!html) return alert('HTML content is required');

            try {
                const response = await fetch('/api/templates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentId,
                        name: name,
                        htmlContent: html,
                        description: 'Custom created template'
                    })
                });
                if (response.ok) {
                    alert('Template saved successfully!');
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error(error);
                alert('Failed to save template');
            }
        }

        async function loadTemplate(id) {
            try {
                const response = await fetch(`/api/templates/${id}`);
                const t = await response.json();
                nameInput.value = t.name;
                htmlInput.value = t.htmlContent;
                handleInput();
            } catch (error) {
                console.error(error);
            }
        }

        function loadDefault() {
            htmlInput.value = `
<div style="padding: 40px; font-family: sans-serif; height: 100%; box-sizing: border-box;">
    <div style="border: 2px solid #1e1b4b; padding: 20px; position: relative; height: 100%;">
        <h1 style="text-align: center; color: #1e1b4b; font-size: 24px; margin-bottom: 5px;">ADMIT PRO ACADEMY</h1>
        <p style="text-align: center; margin: 0; font-weight: bold;">ADMISSION CARD 2024</p>
        
        <hr style="border: 1px solid #1e1b4b; margin: 20px 0;">
        
        <table style="width: 100%; border-collapse: collapse;">
            <tr>
                <td style="padding: 10px; width: 70%;">
                    <p><strong>Candidate Name:</strong> {{name}}</p>
                    <p><strong>Roll Number:</strong> {{roll}}</p>
                    <p><strong>Course:</strong> {{course}}</p>
                    <p><strong>Exam Date:</strong> {{date}}</p>
                    <p><strong>Center:</strong> {{center}}</p>
                </td>
                <td style="padding: 10px; text-align: right; vertical-align: top;">
                    <div style="width: 120px; height: 150px; border: 1px solid #1e1b4b; display: inline-block; text-align: center; line-height: 150px; color: #94a3b8; font-size: 12px;">
                        Affix Photo
                    </div>
                </td>
            </tr>
        </table>
        
        <div style="margin-top: 50px; display: flex; justify-content: space-between;">
            <div style="text-align: center;">
                <p style="margin-bottom: 0;">___________________</p>
                <p style="margin-top: 5px; font-size: 12px;">Candidate Signature</p>
            </div>
            <div style="text-align: center;">
                <p style="margin-bottom: 0;">___________________</p>
                <p style="margin-top: 5px; font-size: 12px;">Authorized Signatory</p>
            </div>
        </div>
        
        <div style="margin-top: 30px; font-size: 10px; color: #64748b;">
            <p><strong>Instructions:</strong></p>
            <ul>
                <li>Please bring this admit card to the examination center.</li>
                <li>Valid ID proof is mandatory along with this card.</li>
                <li>Report at least 30 minutes before the scheduled time.</li>
            </ul>
        </div>
    </div>
</div>`;
            handleInput();
        }
    </script>
</body>

</html>
