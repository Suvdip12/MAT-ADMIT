<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admit Card Generator - Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .response {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .response.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .response.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }

        .response h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .response p {
            margin: 5px 0;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .btn-view {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            margin-top: 15px;
            width: 100%;
        }

        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            position: relative;
            background-color: white;
            margin: 2% auto;
            padding: 0;
            width: 90%;
            max-width: 1000px;
            height: 90vh;
            border-radius: 12px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 22px;
        }

        .close {
            color: white;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            line-height: 1;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .modal-body {
            height: calc(90vh - 80px);
            padding: 0;
        }

        .modal-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 0 0 12px 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎓 Admit Card Generator</h1>
        <p class="subtitle">Test the API with sample data</p>

        <form id="admitCardForm">
            <div class="form-group">
                <label for="name">Student Name</label>
                <input type="text" id="name" name="name" value="Jane Doe" required>
            </div>

            <div class="form-group">
                <label for="roll">Roll Number</label>
                <input type="text" id="roll" name="roll" value="2024CS001" required>
            </div>

            <div class="form-group">
                <label for="reg">Registration Number</label>
                <input type="text" id="reg" name="reg" value="REG-2024-0501">
            </div>

            <div class="form-group">
                <label for="course">Course</label>
                <input type="text" id="course" name="course" value="B.Tech Computer Science">
            </div>

            <div class="form-group">
                <label for="examName">Exam Name</label>
                <input type="text" id="examName" name="examName" value="Final Semester Examination 2024">
            </div>

            <div class="form-group">
                <label for="collegeName">College Name</label>
                <input type="text" id="collegeName" name="collegeName" value="Institute of Technology & Science">
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" value="Advanced Data Structures">
            </div>

            <div class="form-group">
                <label for="date">Exam Date</label>
                <input type="text" id="date" name="date" value="15th May 2024">
            </div>

            <div class="form-group">
                <label for="time">Exam Time</label>
                <input type="text" id="time" name="time" value="10:00 AM - 01:00 PM">
            </div>

            <div class="form-group">
                <label for="room">Room/Hall</label>
                <input type="text" id="room" name="room" value="Block A, Room 304">
            </div>

            <div class="button-group">
                <button type="submit" class="btn-primary">Generate Admit Card</button>
                <button type="button" class="btn-secondary" onclick="resetForm()">Reset</button>
            </div>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Generating admit card...</p>
        </div>

        <div class="response" id="response"></div>
    </div>

    <!-- Modal for viewing admit card -->
    <div id="admitCardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📄 Admit Card Preview</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <iframe id="pdfViewer" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('admitCardForm');
        const loading = document.getElementById('loading');
        const response = document.getElementById('response');
        const modal = document.getElementById('admitCardModal');
        const pdfViewer = document.getElementById('pdfViewer');

        let currentPdfUrl = '';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Collect form data
            const formData = {
                name: document.getElementById('name').value,
                roll: document.getElementById('roll').value,
                reg: document.getElementById('reg').value,
                course: document.getElementById('course').value,
                examName: document.getElementById('examName').value,
                collegeName: document.getElementById('collegeName').value,
                subject: document.getElementById('subject').value,
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                room: document.getElementById('room').value
            };

            // Show loading
            loading.style.display = 'block';
            response.style.display = 'none';

            try {
                const res = await fetch('http://localhost:8080/api/admitcard/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await res.json();

                // Hide loading
                loading.style.display = 'none';

                // Show response
                response.style.display = 'block';

                if (data.success) {
                    currentPdfUrl = data.downloadUrl;
                    response.className = 'response success';
                    response.innerHTML = `
                        <h3>✅ Success!</h3>
                        <p><strong>Message:</strong> ${data.message}</p>
                        <p><strong>File Location:</strong> ${data.downloadUrl}</p>
                        <button class="btn-view" onclick="viewAdmitCard()">
                            👁️ View Admit Card
                        </button>
                    `;
                } else {
                    response.className = 'response error';
                    response.innerHTML = `
                        <h3>❌ Error</h3>
                        <p><strong>Message:</strong> ${data.message}</p>
                    `;
                }
            } catch (error) {
                loading.style.display = 'none';
                response.style.display = 'block';
                response.className = 'response error';
                response.innerHTML = `
                    <h3>❌ Connection Error</h3>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p>Make sure the server is running on port 8080.</p>
                `;
            }
        });

        function viewAdmitCard() {
            if (currentPdfUrl) {
                // Convert the file path to a URL that the browser can access
                // Assuming the server serves the PDFs from the /api/admitcard/download endpoint
                const pdfUrl = currentPdfUrl.replace(/\\/g, '/');
                pdfViewer.src = `http://localhost:8080/api/admitcard/download?file=${encodeURIComponent(pdfUrl)}`;
                modal.style.display = 'block';
            }
        }

        function closeModal() {
            modal.style.display = 'none';
            pdfViewer.src = '';
        }

        function resetForm() {
            form.reset();
            response.style.display = 'none';
            currentPdfUrl = '';
        }

        // Close modal when clicking outside of it
        window.onclick = function (event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        // Close modal with Escape key
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape' && modal.style.display === 'block') {
                closeModal();
            }
        });
    </script>
</body>

</html>
