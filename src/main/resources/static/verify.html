<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Signature | AdmitPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        .verify-container {
            max-width: 800px;
            margin: 4rem auto;
            text-align: center;
        }

        .upload-zone {
            border: 2px dashed var(--card-border);
            border-radius: 1.5rem;
            padding: 4rem 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--card-bg);
            margin-bottom: 2rem;
        }

        .upload-zone:hover, .upload-zone.dragging {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .result-card {
            margin-top: 2rem;
            text-align: left;
            display: none;
        }

        .signature-item {
            padding: 1.5rem;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
        }

        .status-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .status-valid { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-invalid { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .status-warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

        .details h4 { margin-bottom: 0.5rem; font-size: 1.1rem; }
        .details p { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.25rem; }

        .loading-spinner {
            display: none;
            margin: 2rem auto;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">Admit<span>Pro</span></a></div>
            <div class="nav-links">
                <a href="index.html" class="btn btn-outline">Home</a>
            </div>
        </nav>

        <div class="verify-container animate-fade-in">
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Signature Verification</h1>
            <p class="subtitle" style="margin-bottom: 3rem;">Upload a PDF to verify its digital signatures and integrity.</p>

            <div class="upload-zone glass-card" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" hidden accept="application/pdf">
                <i data-lucide="shield-check" size="48" style="color: var(--primary); margin-bottom: 1rem;"></i>
                <h3>Click or Drag PDF here</h3>
                <p style="color: var(--text-muted); margin-top: 0.5rem;">Only digital signatures will be verified</p>
            </div>

            <div id="loader" class="loading-spinner"></div>

            <div id="result-area" class="result-card">
                <!-- Results will be injected here -->
            </div>

            <div id="view-pdf-action" style="display: none; margin-top: 1rem;">
                <button onclick="verifyAndStamp()" class="btn btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <i data-lucide="eye"></i>
                    Verify & View PDF (With Stamps)
                </button>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultArea = document.getElementById('result-area');
        const loader = document.getElementById('loader');

        // Drag and Drop
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragging'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragging');
            handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        async function handleFile(file) {
            if (!file || file.type !== 'application/pdf') {
                alert('Please upload a valid PDF file.');
                return;
            }

            resultArea.style.display = 'none';
            resultArea.innerHTML = '';
            loader.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Verification failed');

                const data = await response.json();
                renderResults(data);
            } catch (error) {
                console.error(error);
                alert('An error occurred during verification.');
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderResults(data) {
            resultArea.style.display = 'block';
            
            const statusClass = data.valid ? 'status-valid' : 'status-invalid';
            const icon = data.valid ? 'check' : 'x';
            const title = data.valid ? 'Signature valid' : 'Signature Not Verified';
            
            resultArea.innerHTML = `
                <div class="glass-card" style="padding: 3rem; text-align: center; border: 2px solid ${data.valid ? '#10b981' : '#ef4444'}; background: rgba(255,255,255,0.02);">
                    <div style="font-size: 80px; margin-bottom: 1.5rem; color: ${data.valid ? '#10b981' : '#ef4444'};">
                        <i data-lucide="${icon}" size="80"></i>
                    </div>
                    
                    <h2 style="font-size: 2rem; margin-bottom: 2rem; color: ${data.valid ? '#10b981' : '#ef4444'};">${title}</h2>
                    
                    <div style="text-align: left; max-width: 400px; margin: 0 auto; padding: 1.5rem; background: rgba(0,0,0,0.2); border-radius: 1rem; border: 1px solid var(--card-border);">
                        <p style="margin-bottom: 0.5rem; font-weight: 600;">Digitally Signed.</p>
                        <p style="margin-bottom: 0.25rem;"><span style="color: var(--text-muted)">Name:</span> ${data.name}</p>
                        <p style="margin-bottom: 0.25rem;"><span style="color: var(--text-muted)">Date:</span> ${data.date}</p>
                        <p style="margin-bottom: 0.25rem;"><span style="color: var(--text-muted)">Reason:</span> ${data.reason}</p>
                        <p style="margin-bottom: 0.25rem;"><span style="color: var(--text-muted)">Location:</span> ${data.location}</p>
                    </div>

                    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap;">
                        <button onclick="downloadStampedPdf()" class="btn btn-primary" style="display: flex; align-items: center; gap: 0.5rem; background: #6366f1;">
                            <i data-lucide="shield-check"></i>
                            Download Stamped PDF
                        </button>
                        <button onclick="downloadPdfReport()" class="btn btn-secondary" style="display: flex; align-items: center; gap: 0.5rem;">
                            <i data-lucide="file-text"></i>
                            View Report
                        </button>
                        <button onclick="location.reload()" class="btn btn-outline" style="border-color: rgba(255,255,255,0.2);">
                            Verify Another
                        </button>
                    </div>
                </div>
            `;
            
            lucide.createIcons();
        }

        async function downloadStampedPdf() {
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                loader.style.display = 'block';
                const response = await fetch('/api/verify-stamp', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Download failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `stamped_${file.name}`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
            } catch (error) {
                console.error(error);
                alert('An error occurred during download.');
            } finally {
                loader.style.display = 'none';
            }
        }

        async function downloadPdfReport() {
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                loader.style.display = 'block';
                const response = await fetch('/api/verify-pdf', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Download failed');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `verification_report_${new Date().getTime()}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
            } catch (error) {
                console.error(error);
                alert('An error occurred during report download.');
            } finally {
                loader.style.display = 'none';
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
