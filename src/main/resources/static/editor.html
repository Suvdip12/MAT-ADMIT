<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Studio | AdmitPro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            height: calc(100vh - 200px);
            margin-top: 2rem;
        }
        textarea {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            color: #e2e8f0;
            font-family: 'Fira Code', monospace;
            padding: 1.5rem;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }
        .preview-pane {
            background: white;
            border-radius: 1rem;
            overflow: auto;
            color: black;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1400px;">
        <nav>
            <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">Admit<span>Pro</span> Studio</a></div>
            <div>
                <button class="btn btn-outline" onclick="window.location.href='index.html'">Cancel</button>
                <button class="btn btn-primary" onclick="saveTemplate()">Save Template</button>
            </div>
        </nav>

        <div class="toolbar animate-fade-in">
            <div>
                <input type="text" id="template-name" placeholder="Template Name" style="background: transparent; border: none; border-bottom: 1px solid var(--card-border); color: white; font-size: 1.5rem; font-weight: 700; outline: none;">
                <p id="status-text" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">New Template</p>
            </div>
            <div class="controls">
                <button class="btn btn-outline btn-sm" onclick="insertPlaceholder()">+ Placeholder</button>
                <button class="btn btn-outline btn-sm" onclick="loadDefault()">Load Default</button>
            </div>
        </div>

        <div class="editor-container animate-fade-in" style="animation-delay: 0.1s;">
            <div class="glass-card" style="padding: 0;">
                <textarea id="html-input" oninput="updatePreview()" placeholder="Enter HTML here... use {{placeholder}} for dynamic fields."></textarea>
            </div>
            <div id="preview" class="preview-pane">
                <!-- Live Preview -->
            </div>
        </div>
    </div>

    <script>
        const htmlInput = document.getElementById('html-input');
        const preview = document.getElementById('preview');
        const nameInput = document.getElementById('template-name');
        let currentId = null;

        // Check for EDIT mode
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('id')) {
            currentId = urlParams.get('id');
            loadTemplate(currentId);
        }

        function updatePreview() {
            preview.innerHTML = htmlInput.value;
        }

        function insertPlaceholder() {
            const p = prompt("Placeholder Name (e.g. name, roll):");
            if (p) {
                const start = htmlInput.selectionStart;
                const end = htmlInput.selectionEnd;
                const text = htmlInput.value;
                htmlInput.value = text.substring(0, start) + `{{${p}}}` + text.substring(end);
                updatePreview();
            }
        }

        async function saveTemplate() {
            const name = nameInput.value || 'Untitled Template';
            const html = htmlInput.value;
            
            if (!html) return alert('HTML content is required');

            try {
                const response = await fetch('/api/templates', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentId,
                        name: name,
                        htmlContent: html,
                        description: 'Custom created template'
                    })
                });
                if (response.ok) {
                    alert('Template saved successfully!');
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error(error);
                alert('Failed to save template');
            }
        }

        async function loadTemplate(id) {
            try {
                const response = await fetch(`/api/templates/${id}`);
                const t = await response.json();
                nameInput.value = t.name;
                htmlInput.value = t.htmlContent;
                updatePreview();
                document.getElementById('status-text').innerText = 'Editing Template';
            } catch (error) {
                console.error(error);
            }
        }

        function loadDefault() {
            htmlInput.value = `
<div style="padding: 40px; font-family: sans-serif; border: 2px solid #000;">
    <h1 style="text-align: center; color: #1e1b4b;">ADMIT CARD</h1>
    <hr>
    <div style="margin: 20px 0;">
        <p><strong>Name:</strong> {{name}}</p>
        <p><strong>Roll No:</strong> {{roll}}</p>
        <p><strong>Course:</strong> {{course}}</p>
    </div>
    <div style="margin-top: 40px; text-align: right;">
        <p>___________________</p>
        <p>Authorized Signatory</p>
    </div>
</div>`;
            updatePreview();
        }
    </script>
</body>
</html>
