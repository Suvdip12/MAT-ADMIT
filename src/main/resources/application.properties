# Logging Configuration - Suppress Warnings
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.com.admitcard=INFO
logging.level.com.itextpdf=ERROR

# PDF Digital Signature Configuration
pdf.signature.enabled=${PDF_SIGNATURE_ENABLED:false}
pdf.signature.keystore-path=${PDF_SIGNATURE_KEYSTORE_PATH:}
pdf.signature.keystore-password=${PDF_SIGNATURE_KEYSTORE_PASSWORD:}
pdf.signature.key-password=${PDF_SIGNATURE_KEY_PASSWORD:${PDF_SIGNATURE_KEYSTORE_PASSWORD:}}
pdf.signature.alias=${PDF_SIGNATURE_ALIAS:}
pdf.signature.reason=${PDF_SIGNATURE_REASON:Digitally signed by AdmitPro}
pdf.signature.location=${PDF_SIGNATURE_LOCATION:AdmitPro}
pdf.signature.visible=${PDF_SIGNATURE_VISIBLE:true}
pdf.signature.page=${PDF_SIGNATURE_PAGE:1}
pdf.signature.x=${PDF_SIGNATURE_X:425}
pdf.signature.y=${PDF_SIGNATURE_Y:100}
pdf.signature.width=${PDF_SIGNATURE_WIDTH:120}
pdf.signature.height=${PDF_SIGNATURE_HEIGHT:60}
pdf.signature.certification-level=${PDF_SIGNATURE_CERTIFICATION_LEVEL:CERTIFIED_NO_CHANGES_ALLOWED}
